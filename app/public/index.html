<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rathkeale College Song Portal</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    
    <!-- Unified Top Branding & Search Bar Alignment Row -->
    <header class="app-branding-container">
      
      <!-- Left Column Area: Branding Identity -->
      <div class="brand-identity-block">
        <h1>Rathkeale College</h1>
        <p>Song Portal</p>
      </div>

      <!-- Right Column Area: SINGLE Operational Search Field Wrapper -->
      <div class="search-bar-wrapper">
        <input type="text" id="search-input" placeholder="Search titles or contexts..." autocomplete="off" />
        <div id="search-suggestions-box" class="suggestions-dropdown hidden"></div>
      </div>

    </header>

    <!-- Calendar Target Widget -->
    <div class="widget">
      <div class="widget-title">Today's Practice Target</div>
      <div id="schedule-text" class="widget-text">Checking calendar schedule...</div>
    </div>

    <!-- REWORKED: High-Accessibility Pill Filter Panel Options -->
    <div class="filter-dashboard">
      <div class="filter-group">
        <span class="filter-label">Classification</span>
        <button id="filter-all-type" class="filter-btn active">All Tracks</button>
        <button id="filter-hymn" class="filter-btn">Hymns</button>
        <button id="filter-anthem" class="filter-btn">Anthems</button>
      </div>
      
      <div class="filter-group">
        <span class="filter-label">Track Length</span>
        <button id="filter-all-len" class="filter-btn active">All Durations</button>
        <button id="filter-short" class="filter-btn">Short (Under 3 mins)</button>
        <button id="filter-long" class="filter-btn">Extended (3+ mins)</button>
      </div>
    </div>

    <!-- HERO ZONE: NOW PLAYING DEPLOYMENT -->
    <div class="hero-layout-zone">
      <div class="column-title">Now Playing Station</div>
      <div id="player-container">
        <div style="color: var(--text-muted); text-align: center; padding: 50px 40px; background: var(--bg-card); border-radius: 16px; border: 1px dashed var(--glass-border);">
          Select an operational track from the catalogue below to stream live media, custom hardware controls, and dynamic lyrical documentation.
        </div>
      </div>
    </div>

    <!-- LOWER GRID ZONE: SONGS LIST CATALOGUE -->
    <div class="catalogue-layout-zone">
      <div class="column-title">Song Catalogue Collection</div>
      <div id="songs-container"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="../src/App.js"></script>
</body>
</html>
